<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F0F2EC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#17150F" media="(prefers-color-scheme: dark)" />
    <meta name="format-detection" content="telephone=no" />

    <!-- 微信/浏览器优化 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta
      name="description"
      content="选一选，就能出图。42 个古风主题 × 458 种姿势 + 7 维度自由组合，一键生成 AI 绘图提示词。by kiki 的 AI 日常。"
    />

    <link rel="icon" type="image/png" href="/assets/logo.png" />

    <title>古风提示词生成器 · by kiki</title>

    <!-- Open Graph（公众号文章插链接 / 朋友圈分享 / 浏览器分享卡片用） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="kiki 的 AI 日常" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:title" content="古风提示词生成器 · 选一选，就能出图" />
    <meta
      property="og:description"
      content="42 个古风主题 × 458 种姿势 + 7 维度自由组合，复制提示词去 AI 绘图工具直接出图。"
    />
    <meta property="og:url" content="https://aixiezhen.tools.kikiaigc.com/" />
    <meta property="og:image" content="https://aixiezhen.tools.kikiaigc.com/assets/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="674" />
    <meta property="og:image:alt" content="古风山水 · 古风提示词生成器" />

    <!-- 微信特殊：除了 og:image，也读取 itemprop="image" 作为缩略图来源 -->
    <link itemprop="image" href="https://aixiezhen.tools.kikiaigc.com/assets/og-image.jpg" />

    <!-- Twitter / X 卡片（顺手做了，转 X 时也好看） -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="古风提示词生成器 · 选一选，就能出图" />
    <meta
      name="twitter:description"
      content="42 个古风主题 × 458 种姿势 + 7 维度自由组合，一键生成 AI 绘图提示词。"
    />
    <meta name="twitter:image" content="https://aixiezhen.tools.kikiaigc.com/assets/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
